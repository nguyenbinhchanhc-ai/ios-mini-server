name: iOSMiniServer
options:
  bundleIdPrefix: com.antigravity
targets:
  iOSMiniServer:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iOSMiniServer
    info:
      path: iOSMiniServer/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSLocalNetworkUsageDescription: "Ứng dụng cần truy cập mạng cục bộ để thiết lập HTTP server chia sẻ file."
        NSBonjourServices:
          - "_http._tcp"
